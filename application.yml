spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate        # never auto on prod, use Flyway
    show-sql: false
  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${BREVO_USER}
    password: ${BREVO_PASS}

jwt:
  secret: ${JWT_SECRET}
  expiry: 86400000              # 24 hours

app:
  allowed-email-domain: pvgcoet.ac.in
  frontend-url: ${FRONTEND_URL}